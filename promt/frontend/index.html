<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimum-scale=1.0" />
    <meta name="theme-color" content="#0D1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WEVOX Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Expand and theme — ready() вызываем из React после монтирования, чтобы спиннер Telegram исчез только когда приложение отрисовалось
      if (window.Telegram && window.Telegram.WebApp) {
        var tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.enableClosingConfirmation) tg.enableClosingConfirmation(false);
        if (tg.isVersionAtLeast && tg.isVersionAtLeast('6.7') && tg.setViewportStableHeight) tg.setViewportStableHeight(true);
        if (tg.setHeaderColor) tg.setHeaderColor('#0D1117');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#0D1117');
        var colorScheme = tg.colorScheme || 'dark';
        if (colorScheme === 'dark') document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;background:linear-gradient(180deg,#0B0F19 0%,#060A13 100%);color:#94A3B8;font-family:system-ui,sans-serif;">Загрузка…</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
